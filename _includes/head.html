<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">

  <link rel="shortcut icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
  <link href="https://fonts.googleapis.com/css?family=Oswald:400,700|Roboto:400,700" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/fonts/font-awesome/css/font-awesome.css' | relative_url }}">
  {% if site.blog_theme == 'light' %}
  <link rel="stylesheet" href="{{ '/assets/stylesheets/light.css' | relative_url }}">
  {% else %}
  <link rel="stylesheet" href="{{ '/assets/stylesheets/dark.css' | relative_url }}">
  {% endif %}
  {% feed_meta %}
</head>
