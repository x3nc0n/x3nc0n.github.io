<div class="post-share">
  <h5>Share:</h5>
  {% assign page_title = page.title | truncate: 110 %}
  <a href="" title="Share on Twitter" onclick="window.open('https://twitter.com/home?status={{ page_title | uri_escape }} - {{ page.url | absolute_url }}{% if site.twitter_username %} by @{{ site.twitter_username }}{% endif %}', 'newwindow', 'width=500, height=225'); return false;" data-turbolinks="false">
    <i class="fa fa-twitter" aria-hidden="true"></i>
  </a>
  <a href="" title="Share on Facebook" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url }}', 'newwindow', 'width=500, height=500'); return false;" data-turbolinks="false">
    <i class="fa fa-facebook" aria-hidden="true"></i>
  </a>
</div>
