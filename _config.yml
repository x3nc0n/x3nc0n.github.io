# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Spaid on Security
email: john@spaid.dev
description: >-
  AI-accelerated DevSecOps, security, cloud, and identity — by John Spaid, Cybersecurity Customer Experience Leader for Oil, Gas, and Energy at Microsoft
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.spaid.dev"
twitter_username: x3nc0n
github_username: x3nc0n

# Monday theme settings
name: Spaid on Security
tagline: Security | Cloud | Identity | AI
about_description: >-
  John Spaid is the Cybersecurity Customer Experience Leader for Microsoft's U.S.
  Oil, Gas, and Energy unit, leading Cloud Solution Architects who help critical
  infrastructure providers strengthen their security posture across Defender XDR,
  Purview, Entra, and Azure. He's focused on AI-accelerated DevSecOps — using
  GitHub Copilot and agentic workflows to ship secure infrastructure at machine
  speed. A former Police Sergeant and EMT, John brings a mission-driven approach to
  security, compliance, and identity. He serves on the board of InfraGard Oklahoma
  and speaks frequently on critical infrastructure protection and cloud security
  modernization.
blog_theme: dark  # dark or light
pic: profile.jpg  # 200x200 portrait in assets/img/

# Social handles (used by Monday theme templates)
twitter: x3nc0n
github: x3nc0n

# Third-party integrations (leave blank to disable)
analytics:          # Google Analytics tracking ID
discus_identifier:  # Disqus shortname

# Build settings
# theme: removed — Monday theme is vendored directly
plugins:
  - jekyll-feed

# Include _pages directory so /blog/ page is processed
include:
  - _pages

# Exclude from processing.
exclude:
  - docs/
  - scripts/
  - .squad/
  - .copilot/
  - .github/
  - README.md
  - vendor/
